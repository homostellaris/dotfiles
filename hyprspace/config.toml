# AeroSpace config.
#
# Reference:
# https://nikitabobko.github.io/AeroSpace/guide
# https://nikitabobko.github.io/AeroSpace/commands

config-version = 2
start-at-login = true

after-startup-command = [
    'exec-and-forget borders active_color=0xff50bfcb inactive_color=0xff414550 width=8.0 hidpi=off',
]

exec-on-workspace-change = [
    '/bin/bash', '-lc',
    'open -g "swiftbar://refreshplugin?name=workspace-labels"; /Users/dan/.config/hyprspace/scripts/refresh-labels.sh "$AEROSPACE_FOCUSED_WORKSPACE" </dev/null >/dev/null 2>&1 & disown'
]

[gaps]
inner.horizontal = 18
inner.vertical = 18
outer.left = 18
outer.right = 18
outer.bottom = 18
outer.top = 18

# ---------- MAIN KEY BINDINGS -----------

[mode.main.binding]
ctrl-alt-cmd-1 = 'workspace 1'
ctrl-alt-cmd-2 = 'workspace 2'
ctrl-alt-cmd-3 = 'workspace 3'
ctrl-alt-cmd-4 = 'workspace 4'
ctrl-alt-cmd-5 = 'workspace 5'
ctrl-alt-cmd-6 = 'workspace 6'
ctrl-alt-cmd-7 = 'workspace 7'

ctrl-alt-cmd-shift-1 = 'move-node-to-workspace 1'
ctrl-alt-cmd-shift-2 = 'move-node-to-workspace 2'
ctrl-alt-cmd-shift-3 = 'move-node-to-workspace 3'
ctrl-alt-cmd-shift-4 = 'move-node-to-workspace 4'
ctrl-alt-cmd-shift-5 = 'move-node-to-workspace 5'
ctrl-alt-cmd-shift-6 = 'move-node-to-workspace 6'
ctrl-alt-cmd-shift-7 = 'move-node-to-workspace 7'

ctrl-alt-cmd-leftSquareBracket  = 'workspace --wrap-around prev'
ctrl-alt-cmd-rightSquareBracket = 'workspace --wrap-around next'
ctrl-alt-cmd-shift-leftSquareBracket  = 'move-node-to-workspace --wrap-around prev'
ctrl-alt-cmd-shift-rightSquareBracket = 'move-node-to-workspace --wrap-around next'

ctrl-alt-cmd-m = 'move-workspace-to-monitor --wrap-around next'
ctrl-alt-cmd-period = 'summon-workspace 6'

ctrl-alt-cmd-left = 'focus left'
ctrl-alt-cmd-down = 'focus down'
ctrl-alt-cmd-up = 'focus up'
ctrl-alt-cmd-right = 'focus right'
ctrl-alt-cmd-h = 'focus left'
ctrl-alt-cmd-j = 'focus down'
ctrl-alt-cmd-k = 'focus up'
ctrl-alt-cmd-l = 'focus right'

ctrl-alt-cmd-shift-left = 'move left'
ctrl-alt-cmd-shift-down = 'move down'
ctrl-alt-cmd-shift-up = 'move up'
ctrl-alt-cmd-shift-right = 'move right'
ctrl-alt-cmd-shift-h = 'move left'
ctrl-alt-cmd-shift-j = 'move down'
ctrl-alt-cmd-shift-k = 'move up'
ctrl-alt-cmd-shift-l = 'move right'

alt-tab = 'focus-back-and-forth'
ctrl-alt-cmd-shift-space = 'layout floating tiling'
ctrl-alt-cmd-shift-semicolon = 'mode service'
ctrl-alt-cmd-shift-slash = 'layout tiles horizontal vertical'
ctrl-alt-cmd-shift-comma = 'layout accordion horizontal vertical'
ctrl-alt-cmd-minus = 'resize smart -50'
ctrl-alt-cmd-equal = 'resize smart +50'
ctrl-alt-cmd-f = 'fullscreen'
ctrl-alt-cmd-shift-f = 'macos-native-fullscreen'

ctrl-alt-cmd-e = 'exec-and-forget /Users/dan/.config/hyprspace/scripts/float-nvim.sh'

# ---------- SERVICE MODE -----------

[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main']
f = ['layout floating tiling', 'mode main']
ctrl-alt-cmd-shift-semicolon = 'mode main'

ctrl-alt-cmd-left = 'join-with left'
ctrl-alt-cmd-down = 'join-with down'
ctrl-alt-cmd-up = 'join-with up'
ctrl-alt-cmd-right = 'join-with right'
ctrl-alt-cmd-h = 'join-with left'
ctrl-alt-cmd-j = 'join-with down'
ctrl-alt-cmd-k = 'join-with up'
ctrl-alt-cmd-l = 'join-with right'

# ---------- WINDOW CONTROL -----------

[[on-window-detected]]
if.app-id = "com.apple.ScreenSharing"
check-further-callbacks = true
run = ["layout floating"]

[[on-window-detected]]
if.app-id = "com.apple.MobileSMS"
check-further-callbacks = true
run = ["layout floating"]

[[on-window-detected]]
if.app-id = 'com.apple.iphonesimulator'
check-further-callbacks = true
run = ["layout floating"]

[[on-window-detected]]
if.app-id = 'com.tinyspeck.slackmacgap'
check-further-callbacks = true
run = ["layout floating"]

[[on-window-detected]]
if.app-id = "com.microsoft.teams2"
check-further-callbacks = true
run = ["layout floating"]

[[on-window-detected]]
if.app-id = 'com.macpaw.CleanMyMac'
check-further-callbacks = true
run = ["layout floating"]

[[on-window-detected]]
if.app-id = "com.macpaw.CleanMyMac4"
check-further-callbacks = true
run = ["layout floating"]

[[on-window-detected]]
if.app-id = "com.bitwarden.desktop"
check-further-callbacks = true
run = ["layout floating"]

[[on-window-detected]]
if.app-id = "com.apple.QuickTimePlayerX"
check-further-callbacks = true
run = ["layout floating"]

[[on-window-detected]]
if.app-id = "com.anthropic.claude"
check-further-callbacks = true
run = ["layout floating"]

[[on-window-detected]]
if.window-title-regex-substring = 'nvim-float'
check-further-callbacks = true
run = ["layout floating", "position center"]

[[on-window-detected]]
run = ['exec-and-forget /Users/dan/.config/hyprspace/scripts/refresh-labels.sh']
